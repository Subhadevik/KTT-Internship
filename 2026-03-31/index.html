<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Analysis Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    
  <div class = "sidebar">
            <h2>E-Commerce Dashboard</h2>
            <ul id = "nav-menus">
                <li><a href="./index.html"><i class="fa fa-fw fa-th-large"></i>Dashboard</a></li>
                <li><a href="./sales.html"><i class="fa fa-fw fa-line-chart"></i>Sales</a></li>
                <li><a href="./products.html"><i class="fa fa-fw fa-cube"></i>Products</a></li>
                <li><a href="./orders.html"><i class="fa fa-fw fa-list-ul"></i>Orders</a></li>
                <li><a href="./customers.html"><i class="fa fa-fw fa-address-book-o"></i>Customers</a></li>
                <li><a href="./analytics.html"><i class="fa fa-fw fa-pie-chart"></i>Analytics</a></li>
                <li><a href="./settings.html"><i class="fa fa-fw fa-cog"></i>Settings</a></li>
            </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h2>Dashboard</h2>
        </div>

        <div class="content">
            <div class="card sale">
                <h3>Total Sales</h3>
                <p>$120,000</p>
            </div>
            <div class="card prod">
                <h3>Total Products</h3>
                <p>1,200</p>
            </div>
            <div class="card cust">
                <h3>Total Customers</h3>
                <p>800</p>
            </div>
            <div class="card ord">
                <h3>Average Order Value</h3>
                <p>$100</p>
            </div>
        </div>

        <div class="charts">
            <div class = container-chart>
                <div id="chart-head">
                    <h3>Summary</h3>
                    <span class="dark"></span> Orders
                    <span class="light"></span> Income growth
                </div>
            </div>

            <div class="products">
                <h3>Most Selling Products</h3>
            </div>
        </div>

    </div>

    
       
</body>
</html>
