<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <main class="layout">
        <div class="sidebar">
            <h3 id="dash">DASHBOARD</h3>
            <img src="./images/dashboard icon.png" alt="Dashboard Icon" class="dashboard-icon">
            <div class="menu-bar">
                <div>
                <a href="#" class="menu">
                    <i class="fa-solid fa-house"></i>
                    <span>Home</span>
                </a>
            </div>

                <div>
                <a href="#" class="menu">
                    <i class="fa-solid fa-user"></i>
                    <span>Profile</span>
                </a>
                </div>

                <div>
                <a href="#" class="menu">
                    <i class="fa-solid fa-wallet"></i>
                    <span>Wallet</span>
                </a>
                </div>

                <div>
                <a href="#" class="menu">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Analytics</span>
                </a>
                </div>

                <div>
                <a href="#" class="menu">
                    <i class="fa-solid fa-list-check"></i>
                    <span>Tasks</span>
                </a>
                </div>

                <div>
                <a href="#" class="menu">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
                </div>

                <div>
                <a href="#" class="menu">
                    <i class="fa-solid fa-circle-question"></i>
                    <span>Help</span>
                </a>
            </div>
            </div>
            <div class="logout">
                <a href="#" class="menu logout-btn">
                    <i class="fa-solid fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </div>

        <div class="main-body">
            <h2 id="head-h2">Skills</h2>
            <img src="./images/user icon.png" alt="user Icon" class="user-icon">
            <div class="courses">
                <div class="course">
                    <img src="./images/web icon.png" alt="web Icon" class="icons-course">
                    <h3>Web Development</h3>
                    <p>Join over 1 million Students</p>
                    <input type="button" value="Get Started" class="btn">
                </div>
                <div class="course">
                    <img src="./images/wordpress-logo.png" alt="wordpress Icon" class="icons-course">
                    <h3>Word Press</h3>
                    <p>Join over 3 million Students</p>
                    <input type="button" value="Get Started" class="btn">
                </div>
                <div class="course">
                    <img src="./images/graphic icon.png" alt="Graphic Design Icon" class="icons-course"> 
                    <h3>Graphic Design </h3>
                    <p>Join over 2 million Students</p>
                    <input type="button" value="Get Started" class="btn">
                </div>
                <div class="course">
                    <img src="./images/android icon.png" alt="IOS Dev Icon" class="icons-course">
                    <h3>IOS Dev</h3>
                    <p>Join over 1 million Students</p>
                    <input type="button" value="Get Started" class="btn">
                </div>
            </div>

        </div>
    </main>
</body>
</html>
